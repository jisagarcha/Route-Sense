services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: routesense-postgres
    environment:
      POSTGRES_USER: routesense
      POSTGRES_PASSWORD: routesense
      POSTGRES_DB: routesense
    ports:
      - "5432:5432"
    volumes:
      - routesense-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routesense -d routesense"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
    container_name: routesense-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://routesense:routesense@postgres:5432/routesense?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-production
      OSRM_BASE_URL: https://router.project-osrm.org
      NOMINATIM_BASE_URL: https://nominatim.openstreetmap.org
      NOMINATIM_USER_AGENT: RouteSense/1.0
      ROUTESENSE_USER_AGENT: RouteSense/1.0
    ports:
      - "3000:3000"
    command: >
      sh -c "npx prisma db push &&
             node seed-demo-users.js &&
             npx prisma db seed &&
             node seed-roads.js &&
             npm run start"

volumes:
  routesense-postgres:
